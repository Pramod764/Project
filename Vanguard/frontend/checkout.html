<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Vanguard Tech Store</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-container {
            max-width: 1000px;
            margin: 120px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            padding: 0 2rem;
        }
        .checkout-form, .order-summary {
            padding: 2rem;
            border-radius: 16px;
        }
        .checkout-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            grid-column: span 2;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
        .summary-total {
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            .checkout-title {
                grid-column: span 1;
            }
        }

        /* Payment Gateway Simulation Styles */
        .processing-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">VANGUARD</a></div>
        <div class="auth-btns">
            <a href="index.html" class="btn btn-outline">Back to Store</a>
        </div>
    </nav>

    <div id="payment-overlay" class="processing-overlay">
        <div class="spinner"></div>
        <h2 style="color: white; font-weight: 300;">Connecting to <span style="color: var(--primary); font-weight: 700;">Secure Gateway</span>...</h2>
        <p style="color: var(--text-muted); margin-top: 1rem;">Please do not refresh the page.</p>
    </div>

    <div class="checkout-container">
        <h1 class="checkout-title">Finalize Your <span style="color: var(--primary);">Innovation.</span></h1>
        
        <div class="checkout-form glass">
            <h2 style="margin-bottom: 1.5rem;">Shipping Details</h2>
            <form id="finalCheckoutForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" id="shipping-address" required placeholder="123 Future Lane, Tech City">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" required placeholder="Neo Tokyo">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone-number" required placeholder="+1 (555) 000-0000">
                    </div>
                </div>
                
                <h2 style="margin: 2rem 0 1.5rem;">Secure Payment</h2>
                <div class="payment-gateway glass" style="padding: 1.5rem; border: 1px solid var(--primary); margin-bottom: 1.5rem;">
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                        <button type="button" class="btn btn-outline" style="flex: 1; border-color: var(--primary);">Card</button>
                        <button type="button" class="btn btn-outline" style="flex: 1; opacity: 0.5;">UPI</button>
                        <button type="button" class="btn btn-outline" style="flex: 1; opacity: 0.5;">Wallet</button>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="4242 4242 4242 4242">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Expiry</label>
                            <input type="text" placeholder="MM / YY">
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" placeholder="•••">
                        </div>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">
                        <span style="color: #10b981;">●</span> Secure 256-bit SSL Encrypted Payment
                    </p>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-weight: 700; letter-spacing: 1px;">INITIALIZE TRANSACTION</button>
            </form>
        </div>

        <div class="order-summary glass">
            <h2 style="margin-bottom: 1.5rem;">Order Summary</h2>
            <div id="checkout-items">
                <!-- Items will be loaded here -->
            </div>
            <div class="summary-total">
                <div class="summary-item">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-item">
                    <span>Shipping</span>
                    <span>FREE</span>
                </div>
                <div class="summary-item" style="color: white;">
                    <span>Total</span>
                    <span id="total-amount">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api";
        let cart = JSON.parse(localStorage.getItem('vanguard_cart')) || [];
        let currentUser = JSON.parse(localStorage.getItem('vanguard_user')) || null;

        document.addEventListener('DOMContentLoaded', () => {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                window.location.href = 'index.html';
                return;
            }
            renderSummary();
        });

        function renderSummary() {
            const container = document.getElementById('checkout-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <img src="${item.image_url}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                        <div style="flex-grow: 1;">
                            <div style="font-size: 0.9rem; font-weight: 600;">${item.name}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">$${item.price} x ${item.quantity}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('subtotal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('total-amount').innerText = `$${total.toFixed(2)}`;
        }

        document.getElementById('finalCheckoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) {
                alert("Please login first.");
                window.location.href = 'index.html';
                return;
            }

            const address = document.getElementById('shipping-address').value;
            const phone = document.getElementById('phone-number').value;
            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

            // Show Payment Gateway Simulation
            const overlay = document.getElementById('payment-overlay');
            overlay.style.display = 'flex';

            try {
                // Simulate network latency for the payment gateway
                await new Promise(resolve => setTimeout(resolve, 3000));

                const response = await fetch(`${API_BASE}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        total_price: total,
                        shipping_address: address,
                        phone_number: phone,
                        items: cart.map(item => ({
                            product_id: item.id,
                            quantity: item.quantity,
                            price: item.price
                        }))
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    overlay.innerHTML = `
                        <div style="font-size: 4rem; margin-bottom: 1.5rem;">✅</div>
                        <h2 style="color: white;">Payment Successful!</h2>
                        <p style="color: var(--text-muted); margin-top: 1rem;">Order #${data.order_id} has been confirmed.</p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'" style="margin-top: 2rem;">Return to Home</button>
                    `;
                    localStorage.removeItem('vanguard_cart');
                } else {
                    overlay.style.display = 'none';
                    alert("Checkout failed. Please try again.");
                }
            } catch (error) {
                console.error("Checkout error:", error);
                overlay.style.display = 'none';
                alert("Server error. Please try again later.");
            }
        });
    </script>
</body>
</html>
